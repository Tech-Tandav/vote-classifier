version: "3.8"

networks:
  vote_classifier:

services:
  web:
    build: .
    container_name: voter_analysis_api
    ports:
      - "9494:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: your-secret-key-change-in-production
      ALLOWED_HOSTS: localhost,127.0.0.1
    volumes:
      - vote_classifier:/app/data   
    stdin_open: true
    tty: true
    networks:
      - vote_classifier
  nginx:
    build:
      context: .
      dockerfile: ./compose/nginx/Dockerfile
    image: vote_classifier
    depends_on:
      - django
    volumes:
      - vote_classifier:/app/media
    ports:
      - 9191:80
    networks:
      - vote_classifier
    restart: always


volumes:
  vote_classifier:

